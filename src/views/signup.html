<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Stellar Seat Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap");
      body {
        font-family: "Outfit", sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">
    <div class="max-w-md w-full">
      <div class="text-center mb-8">
        <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 mb-2">
          ChaiCode Cinema
        </h1>
        <p class="text-slate-400">Create your account</p>
      </div>

      <div class="bg-slate-800/80 backdrop-blur-xl rounded-3xl shadow-2xl p-8 border border-slate-700/50">
        <form id="signupForm" class="space-y-6">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-slate-300 font-medium mb-2">First Name</label>
              <input 
                type="text" 
                id="firstName"
                name="firstName"
                required
                class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 transition-colors"
                placeholder="John"
              />
            </div>
            
            <div>
              <label class="block text-slate-300 font-medium mb-2">Last Name</label>
              <input 
                type="text" 
                id="lastName"
                name="lastName"
                class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 transition-colors"
                placeholder="Doe"
              />
            </div>
          </div>

          <div>
            <label class="block text-slate-300 font-medium mb-2">Phone</label>
            <input 
              type="tel" 
              id="phone"
              name="phone"
              required
              class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 transition-colors"
              placeholder="+1234567890"
            />
          </div>

          <div>
            <label class="block text-slate-300 font-medium mb-2">Email</label>
            <input 
              type="email" 
              id="email"
              name="email"
              required
              class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 transition-colors"
              placeholder="you@example.com"
            />
          </div>

          <div>
            <label class="block text-slate-300 font-medium mb-2">Password</label>
            <input 
              type="password"
              id="password" 
              name="password"
              required
              class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 transition-colors"
              placeholder="••••••••"
            />
          </div>

          <div>
            <label class="block text-slate-300 font-medium mb-2">Confirm Password</label>
            <input 
              type="password"
              id="confirmPassword" 
              name="confirmPassword"
              required
              class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 transition-colors"
              placeholder="••••••••"
            />
          </div>

          <button 
            type="submit"
            class="w-full px-4 py-3 bg-gradient-to-r from-emerald-500 to-cyan-500 text-white font-bold rounded-lg hover:shadow-lg hover:shadow-emerald-500/50 transition-all duration-300"
          >
            Sign Up
          </button>
        </form>

        <div class="mt-6 text-center">
          <p class="text-slate-400">Already have an account?</p>
          <a 
            href="/login"
            class="text-emerald-400 font-semibold hover:text-emerald-300 transition-colors"
          >
            Login here
          </a>
        </div>

        <div class="mt-6">
          <a 
            href="/"
            class="text-slate-400 hover:text-slate-300 text-sm transition-colors"
          >
            ← Back to home
          </a>
        </div>
      </div>

      <div id="errorMessage" class="mt-4 p-4 bg-red-500/10 border border-red-500/50 rounded-lg text-red-400 hidden" role="alert">
        <!-- Error message will be displayed here -->
      </div>
    </div>

    <script>
      const signupForm = document.getElementById('signupForm');
      const errorMessage = document.getElementById('errorMessage');

      signupForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const firstName = document.getElementById('firstName').value;
        const lastName = document.getElementById('lastName').value;
        const phone = document.getElementById('phone').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        // Validate passwords match
        if (password !== confirmPassword) {
          errorMessage.textContent = 'Passwords do not match.';
          errorMessage.classList.remove('hidden');
          return;
        }

        // Validate password length
        if (password.length < 6) {
          errorMessage.textContent = 'Password must be at least 6 characters.';
          errorMessage.classList.remove('hidden');
          return;
        }

        // Validate password format (alphanumeric and underscore only)
        if (!/^[a-zA-Z0-9_]{6,}$/.test(password)) {
          errorMessage.textContent = 'Password must contain only letters, numbers, and underscores.';
          errorMessage.classList.remove('hidden');
          return;
        }

        try {
          const res = await fetch('/auth/register', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ firstName, lastName, phone, email, password })
          });

          const data = await res.json();

          if (!res.ok) {
            errorMessage.textContent = data.message || 'Sign up failed. Please try again.';
            errorMessage.classList.remove('hidden');
            return;
          }

          // Redirect to login page
          window.location.href = '/login';
        } catch (error) {
          errorMessage.textContent = 'An error occurred. Please try again.';
          errorMessage.classList.remove('hidden');
          console.error('Signup error:', error);
        }
      });
    </script>
  </body>
</html>
