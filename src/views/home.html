<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stellar Seat Booking - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap");
      body {
        font-family: "Outfit", sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
      }
      .dialog-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: rgba(0, 0, 0, 0.7);
        z-index: 40;
      }
      .dialog-overlay.show {
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">
    <!-- Main Content -->
    <div class="max-w-2xl w-full">
      <div class="text-center">
        <h1 class="text-6xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 mb-4 tracking-tight">
          ChaiCode Cinema
        </h1>
        <p class="text-slate-300 text-xl mb-8">Experience the magic of cinema</p>
        
        <div class="bg-slate-800/80 backdrop-blur-xl rounded-3xl shadow-2xl p-12 border border-slate-700/50">
          <div class="mb-8">
            <h2 class="text-3xl font-bold text-emerald-400 mb-2">Now Showing</h2>
            <span class="text-red-400 text-2xl font-bold">Dhurandhar The Revenge</span>
            <p class="text-slate-400 mt-4">Jassi ko ghar ki yaad kyu nhi aai?</p>
          </div>

          <div class="flex gap-4 justify-center">
            <button 
              id="bookBtn"
              class="px-8 py-3 bg-gradient-to-r from-emerald-500 to-cyan-500 text-white font-bold rounded-lg hover:shadow-lg hover:shadow-emerald-500/50 transition-all duration-300"
            >
              Book a Ticket
            </button>
            <button 
              id="loginBtn"
              class="px-8 py-3 bg-slate-700 text-slate-100 font-bold rounded-lg hover:bg-slate-600 transition-all duration-300"
            >
              Login
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Dialog -->
    <div id="dialogOverlay" class="dialog-overlay">
      <div class="bg-slate-800 rounded-2xl shadow-2xl p-8 border border-slate-700/50 max-w-md w-full">
        <h2 class="text-2xl font-bold text-emerald-400 mb-4">Book a Ticket?</h2>
        <p class="text-slate-300 mb-8">
          To book a ticket for <span class="font-bold text-red-400">Dhurandhar The Revenge</span>, you need to be logged in. Would you like to continue?
        </p>
        <div class="flex gap-4">
          <button 
            id="cancelBtn"
            class="flex-1 px-4 py-2 bg-slate-700 text-slate-100 font-bold rounded-lg hover:bg-slate-600 transition-all duration-300"
          >
            Cancel
          </button>
          <button 
            id="continueBtn"
            class="flex-1 px-4 py-2 bg-gradient-to-r from-emerald-500 to-cyan-500 text-white font-bold rounded-lg hover:shadow-lg hover:shadow-emerald-500/50 transition-all duration-300"
          >
            Continue
          </button>
        </div>
      </div>
    </div>

    <script>
      const dialogOverlay = document.getElementById('dialogOverlay');
      const bookBtn = document.getElementById('bookBtn');
      const loginBtn = document.getElementById('loginBtn');
      const cancelBtn = document.getElementById('cancelBtn');
      const continueBtn = document.getElementById('continueBtn');

      // Check if user is already authenticated
      async function checkAuth() {
        try {
          const res = await fetch('/auth/me');
          if (res.ok) {
            // User is authenticated, redirect to booking page
            window.location.href = '/booking';
          }
        } catch (error) {
          // User is not authenticated
        }
      }

      bookBtn.addEventListener('click', () => {
        dialogOverlay.classList.add('show');
      });

      loginBtn.addEventListener('click', () => {
        window.location.href = '/login';
      });

      cancelBtn.addEventListener('click', () => {
        dialogOverlay.classList.remove('show');
      });

      continueBtn.addEventListener('click', () => {
        window.location.href = '/login';
      });

      // Check authentication on page load
      checkAuth();
    </script>
  </body>
</html>
