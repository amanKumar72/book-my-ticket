<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Stellar Seat Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap");
      body {
        font-family: "Outfit", sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">
    <div class="max-w-md w-full">
      <div class="text-center mb-8">
        <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 mb-2">
          ChaiCode Cinema
        </h1>
        <p class="text-slate-400">Login to your account</p>
      </div>

      <div class="bg-slate-800/80 backdrop-blur-xl rounded-3xl shadow-2xl p-8 border border-slate-700/50">
        <form id="loginForm" class="space-y-6">
          <div>
            <label class="block text-slate-300 font-medium mb-2">Email</label>
            <input 
              type="email" 
              id="email"
              name="email"
              required
              class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 transition-colors"
              placeholder="you@example.com"
            />
          </div>

          <div>
            <label class="block text-slate-300 font-medium mb-2">Password</label>
            <input 
              type="password"
              id="password" 
              name="password"
              required
              class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500 transition-colors"
              placeholder="••••••••"
            />
          </div>

          <button 
            type="submit"
            class="w-full px-4 py-3 bg-gradient-to-r from-emerald-500 to-cyan-500 text-white font-bold rounded-lg hover:shadow-lg hover:shadow-emerald-500/50 transition-all duration-300"
          >
            Login
          </button>
        </form>

        <div class="mt-6 text-center">
          <p class="text-slate-400">Don't have an account?</p>
          <a 
            href="/signup"
            class="text-emerald-400 font-semibold hover:text-emerald-300 transition-colors"
          >
            Sign up here
          </a>
        </div>

        <div class="mt-6">
          <a 
            href="/"
            class="text-slate-400 hover:text-slate-300 text-sm transition-colors"
          >
            ← Back to home
          </a>
        </div>
      </div>

      <div id="errorMessage" class="mt-4 p-4 bg-red-500/10 border border-red-500/50 rounded-lg text-red-400 hidden" role="alert">
        <!-- Error message will be displayed here -->
      </div>
    </div>

    <script>
      const loginForm = document.getElementById('loginForm');
      const errorMessage = document.getElementById('errorMessage');

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        // Validate password format
        if (!/^[a-zA-Z0-9_]{6,}$/.test(password)) {
          errorMessage.textContent = 'Password must be at least 6 characters and contain only letters, numbers, and underscores.';
          errorMessage.classList.remove('hidden');
          return;
        }

        try {
          const res = await fetch('/auth/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ email, password })
          });

          const data = await res.json();

          if (!res.ok) {
            errorMessage.textContent = data.message || 'Login failed. Please try again.';
            errorMessage.classList.remove('hidden');
            return;
          }

          // Store token in localStorage
          localStorage.setItem('token', data.token);

          // Redirect to booking page
          window.location.href = '/booking';
        } catch (error) {
          errorMessage.textContent = 'An error occurred. Please try again.';
          errorMessage.classList.remove('hidden');
          console.error('Login error:', error);
        }
      });
    </script>
  </body>
</html>
